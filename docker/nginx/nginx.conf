server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/ob1.crt;
    ssl_certificate_key /etc/nginx/certs/ob1.key;

    location / {
        proxy_pass         http://ob1-mcp:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support (MCP uses streaming)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
